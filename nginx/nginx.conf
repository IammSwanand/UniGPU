events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    gzip          on;
    gzip_types    text/plain text/css application/json application/javascript text/xml application/xml;

    # ── Rate limiting (shared memory zone) ──
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;

    upstream backend {
        server backend:8000;
    }

    # ── HTTP → HTTPS redirect ──
    server {
        listen 80;
        server_name YOUR_DOMAIN;

        # Allow Let's Encrypt ACME challenge through (for cert renewal)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── Main HTTPS server ──
    server {
        listen 443 ssl http2;
        server_name YOUR_DOMAIN;

        ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # Security headers
        add_header X-Frame-Options        "SAMEORIGIN"   always;
        add_header X-Content-Type-Options "nosniff"      always;
        add_header X-XSS-Protection       "1; mode=block" always;

        client_max_body_size 50M;  # allow large script/requirements uploads

        # ──────────────────────────────────────────────────────
        # 1. WebSocket: GPU Agent + Provider Dashboard
        #    MUST come before the API regex block.
        #    Agent:    wss://domain/ws/agent/{gpu_id}
        #    Provider: wss://domain/ws/provider/{provider_id}
        # ──────────────────────────────────────────────────────
        location /ws/ {
            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "Upgrade";
            proxy_set_header   Host       $host;
            proxy_set_header   X-Real-IP  $remote_addr;
            # Long timeouts — agents hold connections for the full job duration
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # ──────────────────────────────────────────────────────
        # 2. FastAPI REST routes
        #    No prefix stripping — paths match FastAPI routes exactly.
        #    This means the agent's script_url (/jobs/{id}/download/...)
        #    also works here without any backend code changes.
        # ──────────────────────────────────────────────────────
        location ~ ^/(auth|gpus|jobs|wallet|admin)/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass         http://backend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ──────────────────────────────────────────────────────
        # 3. Swagger UI (optional — consider removing/restricting in prod)
        # ──────────────────────────────────────────────────────
        location /docs {
            proxy_pass http://backend/docs;
            proxy_set_header Host $host;
        }
        location /openapi.json {
            proxy_pass http://backend/openapi.json;
        }
        location /redoc {
            proxy_pass http://backend/redoc;
        }

        # ──────────────────────────────────────────────────────
        # 4. React SPA — MUST be last (catch-all)
        #    try_files falls back to index.html for client-side routes
        #    (/login, /dashboard/client, /download, etc.)
        # ──────────────────────────────────────────────────────
        root /usr/share/nginx/html;
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
