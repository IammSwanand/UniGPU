<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>UniGPU · Google Drive Auth</title>
  <style>
    body { font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #0f172a; color: #94a3b8; }
    p { font-size: 14px; }
  </style>
</head>
<body>
  <p>Connecting to Google Drive…</p>
  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var hash = new URLSearchParams(window.location.hash.replace('#', ''));

      // Authorization Code flow — send auth code to opener
      var code = params.get('code');
      if (code && window.opener) {
        window.opener.postMessage({ gdrive_auth_code: code }, window.location.origin);
        window.close();
        return;
      }

      // Implicit token flow (used only for Picker display) — send access token to opener
      var accessToken = hash.get('access_token');
      if (accessToken && window.opener) {
        window.opener.postMessage({ gdrive_access_token: accessToken }, window.location.origin);
        window.close();
        return;
      }

      // Error or no params — just close
      window.close();
    })();
  </script>
</body>
</html>
