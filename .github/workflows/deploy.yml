name: Deploy to Production

on:
  push:
    branches:
      - main   # triggers on every push/merge to main

jobs:
  deploy:
    name: SSH into VPS and redeploy
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout (so we can verify the commit that triggered this) ──
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Write the .env.prod file onto the VPS ──
      # This keeps your secrets in GitHub, not in the repo.
      # The secret ENV_PROD_CONTENT is the full text of .env.prod
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e   # stop on any error

            # ── Navigate to project directory ──
            cd ~/UniGPU

            # ── Pull latest code from main ──
            git pull origin main

            # ── Write production secrets from GitHub Secrets ──
            # (overwrites .env.prod with the latest secret each deploy)
            cat > backend/.env.prod << 'ENVEOF'
            ${{ secrets.ENV_PROD_CONTENT }}
            ENVEOF

            # ── Rebuild changed images and restart containers ──
            docker compose -f docker-compose.prod.yml up -d --build

            # ── Clean up old/dangling images to save disk space ──
            docker image prune -f

            echo "✅ Deployment complete"
