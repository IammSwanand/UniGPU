
services:

  # ── FastAPI Backend ──
  # PostgreSQL: Supabase (managed) — set DATABASE_URL in .env.prod
  # Redis:      Upstash  (managed) — set REDIS_URL in .env.prod
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: unigpu-backend
    restart: always
    env_file: ./backend/.env.prod
    # Port 8000 is NOT exposed to the host — only Nginx reaches it via Docker network
    expose:
      - "8000"

  # ── Celery Worker + Beat Scheduler ──
  # Handles:
  #   - check_heartbeats (every 30s): marks stale GPUs offline
  #   - process_job (retry): re-matches pending jobs
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: unigpu-celery
    command: celery -A app.worker.celery_app worker --loglevel=info --beat --concurrency=2
    restart: always
    user: "1000:1000"  # non-root security best practice
    env_file: ./backend/.env.prod

  # ── Nginx (SSL termination + WebSocket proxy + React SPA) ──
  # Builds the React frontend and serves it alongside proxying the FastAPI backend.
  # SSL certs are mounted from the host where Certbot runs.
  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    container_name: unigpu-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # SSL certs from Certbot (mounted read-only)
      - /etc/letsencrypt:/etc/letsencrypt:ro
      # Certbot ACME challenge directory (for cert renewal via webroot)
      - certbot-webroot:/var/www/certbot
    depends_on:
      - backend

volumes:
  certbot-webroot:
